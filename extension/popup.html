<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ZieAds Extension</title>
  <style>
    body {
      width: 340px;
      margin: 0;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #fafafa;
      color: #1e293b;
    }
    .header {
      background: #7B2FBE;
      color: white;
      padding: 16px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .logo {
      width: 24px;
      height: 24px;
      background: rgba(255,255,255,0.2);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 14px;
    }
    .content {
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      text-align: center;
    }
    #audit-btn {
      background: #7B2FBE;
      color: white;
      border: none;
      padding: 10px 16px;
      border-radius: 6px;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      font-size: 14px;
      transition: opacity 0.2s;
    }
    #audit-btn:hover {
      opacity: 0.9;
    }
    #audit-btn:disabled {
      background: #94a3b8;
      cursor: not-allowed;
    }
    .result-card {
      display: none;
      background: white;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      padding: 16px;
      text-align: left;
    }
    .score-circle {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: #f1f5f9;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: bold;
      color: #7B2FBE;
      margin: 0 auto 12px;
      border: 3px solid #7B2FBE;
    }
    .loader {
      display: none;
      border: 3px solid #f3f3f3;
      border-radius: 50%;
      border-top: 3px solid #7B2FBE;
      width: 20px;
      height: 20px;
      animation: spin 1s linear infinite;
      margin: 0 auto;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .cta-link {
      display: block;
      margin-top: 12px;
      color: #7B2FBE;
      text-decoration: none;
      font-size: 13px;
      font-weight: 600;
      text-align: center;
    }
    .cta-link:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">Z</div>
    <div style="font-weight: 600; font-size: 15px;">ZieAds Quick Scan</div>
  </div>
  
  <div class="content">
    <div id="website-url" style="font-size: 13px; color: #64748b; word-break: break-all;">Loading current tab...</div>
    
    <button id="audit-btn">Scan This Page</button>
    <div class="loader" id="loader"></div>

    <div class="result-card" id="resultCard">
      <div class="score-circle" id="scoreValue">--</div>
      <div style="font-size: 12px; color: #64748b; text-align: center; margin-bottom: 12px;">Ads Readiness Score</div>
      <div id="findings" style="font-size: 13px; color: #1e293b; display: flex; flex-direction: column; gap: 8px;"></div>
      <a href="#" id="viewFull" class="cta-link" target="_blank">View Full Strategy Report &rarr;</a>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
